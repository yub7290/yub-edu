  open-ai:
    chat-model:
      api-key: ${ai.api-key}
      base-url: ${ai.base-url}
      model-name: ${ai.model}
      max-tokens: ${ai.max-tokens}
      timeout: 180s
    streaming-chat-model:
      api-key: ${ai.api-key}
      base-url: ${ai.base-url}
      model-name: ${ai.model}
      max-tokens: ${ai.max-tokens}
      timeout: ${ai.timeout:60s}

